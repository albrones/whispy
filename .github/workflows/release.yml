name: Release

# Fires ONLY on a version tag push (e.g. v0.1.1). Website pushes carry no tag,
# so a website edit never triggers a Homebrew build. Pushing a tag is the
# manual "ship the app" trigger.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        # GitHub auto-attaches the source tarball at
        # /archive/refs/tags/<tag>.tar.gz — no artifact to build ourselves.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Compute tarball sha256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          # GitHub release tarballs can lag a few seconds after release creation.
          for i in 1 2 3 4 5; do
            SHA="$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')" && break
            echo "retry $i..."; sleep 5
          done
          if [ -z "${SHA:-}" ]; then echo "failed to fetch tarball"; exit 1; fi
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Bump formula in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          URL: ${{ steps.sha.outputs.url }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
          TAG: ${{ steps.sha.outputs.tag }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/albrones/homebrew-whispy.git" tap
          # Start from the canonical formula committed in this repo, then patch
          # url + sha256 to match the just-released tag.
          mkdir -p tap/Formula
          cp packaging/homebrew/whispy.rb tap/Formula/whispy.rb
          python3 - "$URL" "$SHA256" <<'PY'
          import re, sys
          url, sha = sys.argv[1], sys.argv[2]
          p = "tap/Formula/whispy.rb"
          s = open(p).read()
          s = re.sub(r'^(\s*url\s+").*(")$',  lambda m: m.group(1)+url+m.group(2), s, count=1, flags=re.M)
          s = re.sub(r'^(\s*sha256\s+").*(")$', lambda m: m.group(1)+sha+m.group(2), s, count=1, flags=re.M)
          open(p, "w").write(s)
          PY
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whispy.rb
          git commit -m "whispy ${TAG}" || { echo "no formula change"; exit 0; }
          git push
