name: Release

# Fires ONLY on a version tag push (e.g. v0.1.1). Website pushes carry no tag,
# so a website edit never triggers a Homebrew build. Pushing a tag is the
# manual "ship the app" trigger.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        # GitHub auto-attaches the source tarball at
        # /archive/refs/tags/<tag>.tar.gz — no artifact to build ourselves.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
