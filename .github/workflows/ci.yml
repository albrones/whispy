name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sox
        run: brew install sox

      - name: Create venv and install deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install faster-whisper pyobjc-framework-Quartz rumps Pillow pytest pytest-cov

      - name: Run tests
        run: .venv/bin/pytest -v --tb=short

      - name: Run tests with coverage
        run: .venv/bin/pytest --cov=src/whispy --cov-report=term-missing

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ whispy_daemon.py --max-line-length=120 --count --show-source --statistics
